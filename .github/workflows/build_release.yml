name: Build release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build DMG
        run: chmod +x ./scripts/build_mac.sh && ./scripts/build_mac.sh
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: telegramexporter-macos
          path: dist/TelegramExporter.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build EXE
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_win_installer.ps1
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: iscc .\installer\TelegramExporter.iss
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: telegramexporter-windows
          path: dist/TelegramExporterSetup.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Collect artifacts
        run: |
          mkdir -p release
          cp dist/telegramexporter-macos/TelegramExporter.dmg release/
          cp dist/telegramexporter-windows/TelegramExporterSetup.exe release/
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
