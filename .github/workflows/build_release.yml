name: Build release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-12
            dmg: TelegramExporter-mac-intel.dmg
            artifact: telegramexporter-macos-intel
          - os: macos-14
            dmg: TelegramExporter-mac-arm64.dmg
            artifact: telegramexporter-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build DMG
        env:
          DMG_NAME: ${{ matrix.dmg }}
        run: chmod +x ./scripts/build_mac.sh && ./scripts/build_mac.sh
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.dmg }}
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build EXE
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_win_installer.ps1
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: iscc .\installer\TelegramExporter.iss
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: telegramexporter-windows
          path: dist/TelegramExporterSetup.exe
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Collect artifacts
        run: |
          mkdir -p release
          cp dist/telegramexporter-macos-intel/TelegramExporter-mac-intel.dmg release/
          cp dist/telegramexporter-macos-arm64/TelegramExporter-mac-arm64.dmg release/
          cp dist/telegramexporter-windows/TelegramExporterSetup.exe release/
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.DOWNLOADS_TOKEN }}
          repository: morf3uzzz/telegram-exporter-downloads
          target_commitish: main
          files: release/*
