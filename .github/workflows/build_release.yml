name: Build release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Universal2 DMG
        env:
          DMG_NAME: TelegramExporter-mac-universal.dmg
        run: |
          chmod +x ./scripts/build_mac.sh
          VENV_DIR=.venv_universal ./scripts/build_mac.sh
      - name: Publish to Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TelegramExporter-mac-universal.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build EXE
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_win_installer.ps1
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: iscc .\installer\TelegramExporter.iss
      - name: Publish to Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TelegramExporterSetup.exe
